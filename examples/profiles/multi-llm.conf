# Multi-LLM development profile: Anthropic + OpenAI with sandbox isolation.
# Requires OPENAI_API_KEY set in the environment.
#
# Usage: OPENAI_API_KEY=sk-xxx ./claudebox.sh --profile multi-llm
#        OPENAI_API_KEY=sk-xxx ./claudebox.sh --profile multi-llm --shell

--proxy-service openai
--seccomp
--mem-limit 8G
--cpu-limit 400
--idle-timeout 20
