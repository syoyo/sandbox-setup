# Proxy-only mode: credential protection without sandbox isolation.
# Useful for running LLM tools on machines without bwrap or when
# full sandboxing is not needed.
#
# Usage: ./claudebox.sh --profile proxy-only [-- args...]
#        OPENAI_API_KEY=sk-xxx ./claudebox.sh --profile proxy-only --proxy-service openai --shell

--proxy-only
--idle-timeout 15
